name: PR Checks

env:
  FLUTTER_VERSION: '3.38.5'

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  checks:
    name: Analyze / Test / L10n / Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Dart format (changed files only)
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- | grep -E '^(lib|test)/.*\\.dart$' || true)"
          if [ -z "$files" ]; then
            echo "No changed Dart files to format-check."
            exit 0
          fi

          echo "Format-checking files:"
          echo "$files"
          dart format --output=none --set-exit-if-changed $files

      - name: Generate l10n and ensure committed outputs
        run: |
          flutter gen-l10n
      - name: Auto-commit generated l10n outputs
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- lib/l10n; then
            echo "No generated l10n changes."
            exit 0
          fi

          # PRs from forks cannot be pushed by default GITHUB_TOKEN permissions.
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            echo "Detected l10n changes, but this PR comes from a fork."
            echo "CI cannot auto-push; please run flutter gen-l10n locally and commit the generated files."
            git --no-pager diff -- lib/l10n
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add lib/l10n
          git commit -m "chore(l10n): auto-generate localization outputs"
          git push

      - name: Verify l10n workspace is clean
        run: |
          git diff --exit-code -- lib/l10n

      - name: No new untranslated messages (PR)
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA='${{ github.event.pull_request.base.sha }}'
          BASE_DIR="$(mktemp -d)"
          cleanup() {
            git worktree remove --force "$BASE_DIR" >/dev/null 2>&1 || true
            rm -rf "$BASE_DIR" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          git worktree add --detach "$BASE_DIR" "$BASE_SHA"
          pushd "$BASE_DIR" >/dev/null
          flutter pub get
          flutter gen-l10n
          popd >/dev/null

          python3 .github/scripts/check_no_new_untranslated.py \
            "$BASE_DIR/desiredFileName.txt" \
            "desiredFileName.txt"

      - name: dart analyze (root package only)
        run: dart analyze --fatal-infos lib test

      - name: flutter test
        run: flutter test
